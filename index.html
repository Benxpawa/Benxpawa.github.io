    <!-- Dark Mode -->
    <script>
        function setTheme(theme) {
            if (theme === 'auto') {
                const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 

'dark' : 'light';
                document.documentElement.setAttribute('data-theme', systemTheme);
                localStorage.setItem('theme', 'auto');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            }
            updateIcon(theme);
        }

        function toggleTheme() {
            const currentTheme = localStorage.getItem('theme') || 'auto';
            let newTheme;

            if (currentTheme === 'light') {
                newTheme = 'dark';
            } else if (currentTheme === 'dark') {
                newTheme = 'auto';
            } else {
                newTheme = 'light';
            }

            setTheme(newTheme);
        }

        function updateIcon(theme) {
            const iconElement = document.getElementById('theme-icon');
            if (iconElement) {
                iconElement.classList.remove('icon-sun-inv', 'icon-moon-inv', 'icon-auto');
                if (theme === 'light') {
                    iconElement.classList.add('icon-sun-inv');
                } else if (theme === 'dark') {
                    iconElement.classList.add('icon-moon-inv');
                } else {
                    iconElement.classList.add('icon-auto');
                }
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme') || 'auto';
            setTheme(savedTheme);
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (localStorage.getItem('theme') === 'auto') {
                const newTheme = e.matches ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', newTheme);
                updateIcon('auto');
            }
        });
    </script>

            function getFileNameFromUrl(url) {
                if (typeof url === 'string') {
                    // 创建一个<a>元素来模拟请求
                    const a = document.createElement('a');
                    a.href = url;

                    // 获取URL的文件名
                    return a.pathname.split('/').pop();
                }
            }

            function getSuffix(url) {
                if (typeof url === 'string') {
                    // 创建一个<a>元素来模拟请求
                    const a = document.createElement('a');
                    a.href = url;

                    // 获取URL的文件扩展名
                    const pathArray = a.pathname.split('.');
                    return pathArray[pathArray.length - 1];
                }
                return '';
            }

            function getMimeTypeFromSuffix(suffix) {
                // 定义支持的MIME类型与文件扩展名的映射关系
                const mimeTypes = {
                    'mp3': 'audio/mpeg',
                    'wav': 'audio/wav',
                    'ogg': 'audio/ogg',
                    'm3u': 'audio/x-mpegurl',
                    'flac': 'audio/flac',
                };

                // 如果文件扩展名存在于映射关系中，则返回对应的MIME类型；否则返回null
                return mimeTypes[suffix] || null;
            }
